<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Request — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <div class="nav-tabs" id="nav"></div>
  <div class="card" style="max-width:560px">
    <h2>Request a Certificate</h2>
    <form id="reqForm">
      <label>Reason</label>
      <select id="reason" required>
        <option value="">Select a reason</option>
        <option value="Travel">Travel</option>
        <option value="Financial">Financial</option>
        <option value="Other">Other</option>
      </select>

      <div id="otherReasonWrap" style="display:none">
        <label>Other Reason</label>
        <input type="text" id="other_reason" placeholder="Please specify">
      </div>

      <label>Include Salary Information?</label>
      <select id="include_salary" required>
        <option value="0">No (reviewed by HR Staff)</option>
        <option value="1">Yes (reviewed by HR Director, who confirms the salary figure)</option>
      </select>

      <label>Language</label>
      <select id="language">
        <option value="English">English</option>
        <option value="Thai">Thai</option>
      </select>

      <label>Delivery Method</label>
      <select id="delivery_method" required>
        <option value="Download">Download</option>
        <option value="Email">Email</option>
      </select>

      <label>Remarks (optional)</label>
      <textarea id="remarks" placeholder="Any additional notes"></textarea>

      <button class="btn" type="submit">Submit Request</button>
      <div class="error" id="err"></div>
      <div class="success-msg" id="ok"></div>
    </form>
  </div>
</div>
<script src="js/common.js"></script>
<script>
(async () => {
  const user = await requireSession();
  if (!user) return;
  if (user.role !== 'employee') { window.location.href = 'dashboard.html'; return; }
  renderTopbar(user);
  renderNav(user, 'new-request.html');

  document.getElementById('reason').addEventListener('change', e => {
    document.getElementById('otherReasonWrap').style.display = e.target.value === 'Other' ? '' : 'none';
  });

  document.getElementById('reqForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('err');
    const okEl = document.getElementById('ok');
    errEl.textContent = ''; okEl.textContent = '';

    const include_salary = document.getElementById('include_salary').value === '1';
    const body = {
      reason: document.getElementById('reason').value,
      other_reason: document.getElementById('other_reason').value,
      include_salary,
      language: document.getElementById('language').value,
      delivery_method: document.getElementById('delivery_method').value,
      remarks: document.getElementById('remarks').value
    };
    try {
      const { request } = await api('POST', '/api/requests', body);
      okEl.textContent = `Request #${request.request_id} submitted. Status: ${request.status}.`;
      e.target.reset();
      document.getElementById('otherReasonWrap').style.display = 'none';
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } catch (err) {
      errEl.textContent = err.message;
    }
  });
})();
</script>
</body>
</html>
