<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Requests — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <div class="nav-tabs" id="nav"></div>
  <div class="card">
    <h2>My Certificate Requests</h2>
    <div class="table-wrap"><table>
      <thead>
        <tr>
          <th>ID</th><th>Reason</th><th>Salary</th>
          <th>Delivery</th><th>Status</th><th>Approved By</th><th>Created</th><th></th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="8">Loading...</td></tr></tbody>
    </table></div>
  </div>
</div>
<script src="js/common.js"></script>
<script>
(async () => {
  const user = await requireSession();
  if (!user) return;
  if (user.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderTopbar(user);
  renderNav(user, 'dashboard.html');

  try {
    const { requests } = await api('GET', '/api/requests');
    const tbody = document.getElementById('rows');
    if (requests.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7">You haven't submitted any requests yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = requests.map(r => `
      <tr>
        <td>#${r.request_id}</td>
        <td>${r.reason}${r.reason === 'Other' ? ' — ' + (r.other_reason||'') : ''}</td>
        <td>${r.include_salary ? 'Yes' : 'No'}</td>
        <td>${r.delivery_method}</td>
        <td>${badge(r.status)}</td>
        <td>${r.approver_name || '—'}</td>
        <td>${new Date(r.created_date).toLocaleString()}</td>
        <td>${r.status === 'Completed' ? `<a class="btn small" href="/api/requests/${r.request_id}?download=1">Download</a>` : ''}</td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="7">Error: ${e.message}</td></tr>`;
  }
})();
</script>
</body>
</html>
