<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Profile — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <div class="nav-tabs" id="nav"></div>

  <div class="card" style="max-width:480px">
    <h2>Change Password</h2>
    <form id="pwForm">
      <label>Current Password</label>
      <input type="password" id="current_password" required>
      <label>New Password</label>
      <input type="password" id="new_password" required minlength="6">
      <div class="hint">At least 6 characters.</div>
      <label>Confirm New Password</label>
      <input type="password" id="confirm_password" required minlength="6">
      <button class="btn" type="submit">Update Password</button>
      <div class="error" id="pwErr"></div>
      <div class="success-msg" id="pwOk"></div>
    </form>
  </div>

  <div class="card" id="sigCard" style="display:none;max-width:480px">
    <h2>My Signature</h2>
    <p class="hint">This image will be automatically embedded on certificates you approve, in place of a blank signature line.</p>
    <div id="sigPreviewWrap" style="margin-bottom:10px"></div>
    <input type="file" id="sigFile" accept="image/png,image/jpeg">
    <button class="btn" id="sigBtn" type="button">Upload Signature</button>
    <div class="error" id="sigErr"></div>
    <div class="success-msg" id="sigOk"></div>
  </div>
</div>
<script src="js/common.js"></script>
<script>
let currentUser = null;

(async () => {
  const user = await requireSession();
  if (!user) return;
  currentUser = user;
  renderTopbar(user);
  renderNav(user, 'profile.html');

  if (['hr_staff', 'hr_director'].includes(user.role)) {
    document.getElementById('sigCard').style.display = '';
  }
})();

document.getElementById('pwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('pwErr');
  const okEl = document.getElementById('pwOk');
  errEl.textContent = ''; okEl.textContent = '';

  const current_password = document.getElementById('current_password').value;
  const new_password = document.getElementById('new_password').value;
  const confirm_password = document.getElementById('confirm_password').value;

  if (new_password !== confirm_password) {
    errEl.textContent = 'New password and confirmation do not match.';
    return;
  }

  try {
    await api('POST', '/api/auth', { action: 'change_password', current_password, new_password });
    okEl.textContent = 'Password updated successfully.';
    e.target.reset();
  } catch (err) {
    errEl.textContent = err.message;
  }
});

document.getElementById('sigBtn').addEventListener('click', async () => {
  const fileInput = document.getElementById('sigFile');
  const errEl = document.getElementById('sigErr');
  const okEl = document.getElementById('sigOk');
  errEl.textContent = ''; okEl.textContent = '';

  const file = fileInput.files[0];
  if (!file) {
    errEl.textContent = 'Please choose an image file first.';
    return;
  }
  if (!['image/png', 'image/jpeg'].includes(file.type)) {
    errEl.textContent = 'Only PNG or JPG images are supported.';
    return;
  }

  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    await api('POST', '/api/auth', { action: 'upload_signature', signature: dataUrl });
    okEl.textContent = 'Signature uploaded.';
    document.getElementById('sigPreviewWrap').innerHTML = `<img src="${dataUrl}" style="max-width:200px;max-height:80px;border:1px solid var(--border);border-radius:6px;padding:6px">`;
    fileInput.value = '';
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
