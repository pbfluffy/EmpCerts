<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Approvals — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <div class="nav-tabs" id="nav"></div>
  <div class="card">
    <h2 id="queueTitle">Pending Approvals</h2>
    <div class="table-wrap"><table>
      <thead>
        <tr><th>ID</th><th>Employee</th><th>Dept / Position</th><th>Reason</th><th>Remarks</th><th>Submitted</th><th></th></tr>
      </thead>
      <tbody id="rows"><tr><td colspan="7">Loading...</td></tr></tbody>
    </table></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Decision</h2>
    <div id="salaryFieldWrap" style="display:none">
      <label>Salary Amount (to print on the certificate)</label>
      <input type="number" id="salaryInput" step="0.01" min="0" placeholder="e.g. 45000.00">
    </div>
    <label>Comment (optional, required if rejecting)</label>
    <textarea id="comment"></textarea>
    <div class="flex-row" style="margin-top:14px">
      <button class="btn" id="approveBtn">Approve</button>
      <button class="btn danger" id="rejectBtn">Reject</button>
      <button class="btn secondary" id="cancelBtn">Cancel</button>
    </div>
    <div class="error" id="modalErr"></div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
let currentId = null;
let currentIncludesSalary = false;
let currentUser = null;

(async () => {
  const user = await requireSession();
  if (!user) return;
  if (!['hr_staff','hr_director'].includes(user.role)) { window.location.href = 'dashboard.html'; return; }
  currentUser = user;
  renderTopbar(user);
  renderNav(user, 'approvals.html');
  document.getElementById('queueTitle').textContent =
    user.role === 'hr_director' ? 'Pending Salary Certificate Approvals' : 'Pending Certificate Approvals (No Salary)';
  await load();
})();

async function load() {
  try {
    const { requests } = await api('GET', '/api/approvals');
    const tbody = document.getElementById('rows');

    if (requests.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7">No pending approvals.</td></tr>`;
      return;
    }
    tbody.innerHTML = requests.map(r => `
      <tr>
        <td>#${r.request_id}</td>
        <td>${r.employee_name}</td>
        <td>${r.department || ''} / ${r.position || ''}</td>
        <td>${r.reason}${r.reason === 'Other' ? ' — ' + (r.other_reason||'') : ''}</td>
        <td>${r.remarks || ''}</td>
        <td>${new Date(r.created_date).toLocaleString()}</td>
        <td><button class="btn small" onclick="openModal(${r.request_id}, ${r.include_salary})">Review</button></td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="7">Error: ${e.message}</td></tr>`;
  }
}

function openModal(id, includesSalary) {
  currentId = id;
  currentIncludesSalary = !!includesSalary;
  document.getElementById('modalTitle').textContent = `Decision for Request #${id}`;
  document.getElementById('comment').value = '';
  document.getElementById('salaryInput').value = '';
  document.getElementById('salaryFieldWrap').style.display = currentIncludesSalary ? '' : 'none';
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalBg').classList.add('open');
}
document.getElementById('cancelBtn').onclick = () => document.getElementById('modalBg').classList.remove('open');

async function decide(decision) {
  const comment = document.getElementById('comment').value;
  const errEl = document.getElementById('modalErr');
  if (decision === 'Rejected' && !comment.trim()) {
    errEl.textContent = 'A comment is required when rejecting.';
    return;
  }
  const body = { request_id: currentId, decision, comment };
  if (decision === 'Approved' && currentIncludesSalary) {
    const salaryVal = document.getElementById('salaryInput').value;
    if (!salaryVal || isNaN(parseFloat(salaryVal))) {
      errEl.textContent = 'Please enter a valid salary amount.';
      return;
    }
    body.salary_amount = parseFloat(salaryVal);
  }
  try {
    await api('POST', '/api/approvals', body);
    document.getElementById('modalBg').classList.remove('open');
    await load();
    // Refresh the nav badge count after decision
    renderNav(currentUser, 'approvals.html');
  } catch (e) {
    errEl.textContent = e.message;
  }
}
document.getElementById('approveBtn').onclick = () => decide('Approved');
document.getElementById('rejectBtn').onclick = () => decide('Rejected');
</script>
</body>
</html>
