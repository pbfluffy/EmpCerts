<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign Up — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="card login-card">
    <h1>Request an Account</h1>
    <p class="hint" style="text-align:center;margin-bottom:14px">
      Your request will be reviewed by an administrator before your account is activated.
    </p>
    <form id="signupForm">
      <label>Employee ID</label>
      <input type="number" id="employee_id" required min="1" placeholder="e.g. 1001">
      <label>Email</label>
      <input type="email" id="email" required placeholder="your.email@company.com">
      <label>Password</label>
      <input type="password" id="password" required minlength="6">
      <div class="hint">At least 6 characters.</div>
      <label>Confirm Password</label>
      <input type="password" id="confirm_password" required minlength="6">
      <button class="btn" style="width:100%;margin-top:18px" type="submit">Submit Request</button>
      <div class="error" id="err"></div>
      <div class="success-msg" id="ok"></div>
    </form>
    <p class="hint" style="text-align:center;margin-top:14px">
      Already have an account? <a href="index.html">Log in</a>
    </p>
  </div>
</div>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('err');
  const okEl = document.getElementById('ok');
  errEl.textContent = ''; okEl.textContent = '';

  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    return;
  }

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'signup',
        employee_id: document.getElementById('employee_id').value,
        email: document.getElementById('email').value,
        password
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');
    okEl.textContent = data.message || 'Request submitted. Awaiting admin approval.';
    e.target.reset();
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
