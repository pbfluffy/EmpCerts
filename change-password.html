<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change Password — Employee Certificate System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="card login-card">
    <h1>Change Your Password</h1>
    <p class="hint" style="text-align:center;margin-bottom:16px">
      Your account was set up with a temporary password. Please set a new password before continuing.
    </p>
    <form id="cpForm">
      <label>Current (Temporary) Password</label>
      <input type="password" id="current_password" required autocomplete="current-password">
      <label>New Password</label>
      <input type="password" id="new_password" required minlength="6">
      <div class="hint">At least 6 characters.</div>
      <label>Confirm New Password</label>
      <input type="password" id="confirm_password" required minlength="6">
      <button class="btn" style="width:100%;margin-top:18px" type="submit">Set New Password</button>
      <div class="error" id="err"></div>
    </form>
  </div>
</div>
<script>
document.getElementById('cpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('err');
  errEl.textContent = '';

  const current_password = document.getElementById('current_password').value;
  const new_password = document.getElementById('new_password').value;
  const confirm = document.getElementById('confirm_password').value;

  if (new_password !== confirm) {
    errEl.textContent = 'New passwords do not match.';
    return;
  }
  if (new_password === current_password) {
    errEl.textContent = 'New password must be different from the temporary password.';
    return;
  }

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'change_password', current_password, new_password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    window.location.href = 'dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
